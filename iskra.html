<!DOCTYPE html>
<html>
<body>
<script>
console.log("Искра iframe загружена");

// читаем ссылку комнаты из URL
const params = new URLSearchParams(location.search);
const roomLink = params.get("room");

if (!roomLink) {
    console.error("Нет ссылки комнаты");
}

// настройки модели
const MODEL_URL  = "http://localhost:4891/v1/chat/completions";
const MODEL_NAME = "phi-3-mini-4k-instruct-q4_k_m.gguf";

async function askLLM(username, text) {
    const body = {
        model: MODEL_NAME,
        messages: [
            { role: "system", content: "Ты — Искра. Отвечай по‑русски, живо, коротко, с характером." },
            { role: "user", content: username + ": " + text }
        ],
        max_tokens: 150,
        temperature: 0.7
    };

    const res = await fetch(MODEL_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
    });

    const data = await res.json();
    return (data.choices?.[0]?.message?.content || "").trim();
}

function getServer(roomLink) {
    const id = roomLink.split("/room/")[1];
    const suf = id.split(".")[1] || "3";
    return suf == 3 ? "sv3." : suf == 2 ? "sv2." : "sv1.";
}

const botName = "Искра";
const server = getServer(roomLink);

const ws = new WebSocket("wss://" + server + "drawaria.online/socket.io/?EIO=3&transport=websocket");

ws.onopen = () => console.log("Искра iframe: WebSocket открыт");

ws.onmessage = async (event) => {
    const raw = String(event.data);

    if (raw.startsWith("40")) {
        ws.send(
            '420["startplay","' + botName + '",1,"en","' + roomLink + '",null,[null,"https://drawaria.online/",1000,1000,[null,"",""],null]]'
        );
        console.log("Искра iframe вошла в комнату");
    }

    if (raw.startsWith("42")) {
        let payload;
        try { payload = JSON.parse(raw.slice(2)); } catch { return; }

        if (payload[0] === "bc_chat") {
            const username = payload[1];
            const text     = payload[2];

            if (!text) return;
            if (username === botName) return;

            const reply = await askLLM(username, text);
            if (reply) {
                ws.send('42["chatmsg","' + reply.replace(/"/g, '\\"') + '"]');
                console.log("Искра:", reply);
            }
        }
    }
};
</script>
</body>
</html>
